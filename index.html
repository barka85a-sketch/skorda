<!DOCTYPE html>
<!-- Skörda v0.2.1 -->
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Skörda</title>
<meta name="theme-color" content="#1F3A29">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=bricolage-grotesque:600,700,800|inter:400,500,600,700" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --paper:#F5F1E6;--paper-2:#EFEAD9;--kale:#1F3A29;--leaf:#3F7D53;--leaf-soft:#DCE7DA;
  --tomato:#D9432B;--tomato-dk:#B4341F;--yolk:#EBAF2E;--sky:#2E6BE6;--teal:#0E9E9E;
  --ink:#22271F;--muted:#6E7469;--line:#DAD3BE;--kraft:#C9A876;--kraft-dk:#A9884F;
  --white:#FFFDF7;--shadow:0 10px 30px rgba(31,58,41,.14);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;margin:0}
#app{height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative;background:var(--white)}
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;gap:10px}
.top .ttl{font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;letter-spacing:-.02em;color:var(--kale)}
.top .sub{font-size:12px;color:var(--muted)}
.toggle{display:flex;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px}
.toggle button{border:none;background:transparent;font-family:'Bricolage Grotesque';font-weight:700;font-size:13px;color:var(--muted);padding:8px 12px;border-radius:9px;cursor:pointer}
.toggle button.on{background:var(--white);color:var(--kale);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.filterbar{padding:0 16px 8px}
.distrow{display:flex;align-items:center;gap:12px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:10px}
.distrow .lbl{font-size:12px;font-weight:700;color:var(--kale);white-space:nowrap}
.distrow .val{font-family:'Bricolage Grotesque';font-weight:800;color:var(--tomato);font-size:15px;min-width:52px;text-align:right}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:99px;background:var(--line);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:99px;background:var(--kale);border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:99px;background:var(--kale);border:3px solid #fff;cursor:pointer}
.hchip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.hchip::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--white);border:1px solid var(--line);border-radius:99px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--kale);cursor:pointer;transition:.12s}
.chip.on{background:var(--kale);color:#fff;border-color:var(--kale)}
#map{flex:1;width:100%;background:var(--paper-2)}
.leaflet-container{font:inherit;background:var(--paper-2)}
.pin{display:flex;flex-direction:column;align-items:center;gap:3px;transform:translateY(-6px)}
.pin .price{font-family:'Bricolage Grotesque';font-weight:800;font-size:12px;padding:5px 8px;border-radius:10px;position:relative;white-space:nowrap;color:#fff;background:var(--tomato);box-shadow:0 3px 6px rgba(31,58,41,.3)}
.pin .price:after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:6px solid var(--tomato)}
.pin.soon .price{background:var(--yolk);color:#4a3708}.pin.soon .price:after{border-top-color:var(--yolk)}
.pin.gift .price{background:var(--sky)}.pin.gift .price:after{border-top-color:var(--sky)}
.pin.order .price{background:var(--kraft-dk)}.pin.order .price:after{border-top-color:var(--kraft-dk)}
.pin.public .price{background:var(--teal)}.pin.public .price:after{border-top-color:var(--teal)}
.pin .prate{font-size:9.5px;font-weight:800;color:#8A6A12;background:#fff;border:1px solid var(--line);border-radius:99px;padding:1px 6px;display:inline-flex;align-items:center;gap:2px;box-shadow:0 2px 4px rgba(0,0,0,.14)}
.pin .prate svg{width:9px;height:9px}
.mepin{width:18px;height:18px;border-radius:99px;background:var(--sky);border:3px solid #fff;box-shadow:0 0 0 6px rgba(46,107,230,.18)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sortrow{display:flex;align-items:center;gap:8px;padding:2px 16px 10px}
.sortrow .sortlbl{font-size:12px;font-weight:700;color:var(--muted)}
.sortbtn{border:1px solid var(--line);background:var(--white);color:var(--kale);font-family:'Bricolage Grotesque';font-weight:700;font-size:12.5px;padding:6px 12px;border-radius:99px;cursor:pointer}
.sortbtn.on{background:var(--kale);color:#fff;border-color:var(--kale)}
.list{padding:0 16px 24px}
.card{background:var(--white);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:14px;cursor:pointer}
.thumb{height:120px;display:flex;align-items:center;justify-content:center;position:relative}
.thumb svg{width:76px;height:76px}
.stwrap{position:absolute;top:10px;left:10px}
.st{font-size:11px;font-weight:700;padding:4px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:5px;border:1px solid}
.st:before{content:"";width:7px;height:7px;border-radius:99px}
.st.now{color:#2A6B3E;border-color:#BFD8C4;background:#EAF3EC}.st.now:before{background:#2A6B3E}
.st.soon{color:#8A6A12;border-color:#E7D59A;background:#FBF3DA}.st.soon:before{background:var(--yolk)}
.st.order{color:#7A5A2A;border-color:#DFC79A;background:#F5ECD8}.st.order:before{background:var(--kraft-dk)}
.st.gift{color:#1E4FA8;border-color:#BCD0F0;background:#E7EFFB}.st.gift:before{background:var(--sky)}
.st.public{color:#0E6E6E;border-color:#A9D9D9;background:#E3F2F2}.st.public:before{background:var(--teal)}
.tag{position:absolute;bottom:-12px;right:12px;background:linear-gradient(180deg,#D3B27E,#C39C61);color:#3a2c12;font-family:'Bricolage Grotesque';font-weight:800;font-size:15px;padding:8px 12px 8px 20px;border-radius:6px;box-shadow:0 6px 12px rgba(93,68,20,.28);transform:rotate(-3deg)}
.tag:before{content:"";position:absolute;left:8px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:99px;background:var(--paper);box-shadow:inset 0 0 0 2px var(--kraft-dk)}
.tag small{font-weight:600;font-size:10.5px;opacity:.8}
.tag.free{background:linear-gradient(180deg,#5f93e6,#2E6BE6);color:#fff}.tag.free:before{box-shadow:inset 0 0 0 2px #1E4FA8;background:#E7EFFB}
.tag.publict{background:linear-gradient(180deg,#3fb3b3,#0E9E9E);color:#fff}.tag.publict:before{box-shadow:inset 0 0 0 2px #0E6E6E;background:#E3F2F2}
.cbody{padding:12px 14px}
.cbody .name{font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;margin:0 0 3px;color:var(--ink)}
.cbody .meta{font-size:12.5px;color:var(--muted);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.rate{display:inline-flex;align-items:center;gap:3px;color:#8A6A12;font-weight:600}
.rate svg{width:13px;height:13px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:36px 24px}
.empty b{display:block;font-family:'Bricolage Grotesque';color:var(--kale);font-size:16px;margin-bottom:6px}
.overlay{position:absolute;inset:0;background:var(--white);z-index:1200;display:none;flex-direction:column;overflow:hidden}
.overlay.on{display:flex}
.hero{height:220px;display:flex;align-items:center;justify-content:center;position:relative;flex:0 0 auto}
.hero svg{width:120px;height:120px}
.back{position:absolute;top:12px;left:12px;width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.92);display:grid;place-items:center;cursor:pointer;border:1px solid var(--line);z-index:5}
.sec{padding:16px 18px;border-top:8px solid var(--paper)}
.sec:first-of-type{border-top:none}
.k{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin:0 0 8px}
.price-lg{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;color:var(--tomato);letter-spacing:-.02em}
.price-lg.free{color:var(--sky)}.price-lg.public{color:var(--teal)}
.price-lg small{font-size:14px;color:var(--muted);font-weight:600}
.privacy{display:flex;gap:10px;background:#FBF6E7;border:1px solid #E7D59A;border-radius:14px;padding:12px;font-size:12.5px;color:#6a5312}
.privacy svg{flex:0 0 auto;margin-top:1px}
.btn{display:block;width:100%;text-align:center;font-family:'Bricolage Grotesque';font-weight:700;font-size:15.5px;padding:15px;border-radius:15px;border:none;cursor:pointer;background:var(--tomato);color:#fff;box-shadow:0 8px 18px rgba(217,67,43,.28)}
.btn:active{background:var(--tomato-dk)}
.btn.ghost{background:var(--white);color:var(--kale);border:1.5px solid var(--kale);box-shadow:none}
.btn.dark{background:var(--kale);color:#fff;box-shadow:none}
.btn.sm{padding:11px;font-size:13.5px;border-radius:12px}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
.nav{height:66px;background:var(--white);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 4px 4px;flex:0 0 auto}
.nav a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);font-weight:600;cursor:pointer;padding:6px 4px;border-radius:12px}
.nav a.on{color:var(--kale)}.nav a.on svg{stroke:var(--kale)}
.nav a .plus{width:46px;height:46px;border-radius:16px;background:var(--tomato);display:grid;place-items:center;box-shadow:0 8px 18px rgba(217,67,43,.34);margin-top:-18px}
.view{display:none;flex:1;flex-direction:column;min-height:0}
.view.on{display:flex}
.banner{background:#FBF6E7;border-bottom:1px solid #E7D59A;color:#6a5312;font-size:11px;padding:5px 16px;text-align:center;flex:0 0 auto}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--kale);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:inherit;font-size:14px;background:var(--white);color:var(--ink)}
.field textarea{min-height:64px;resize:none}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg .opt{flex:1;min-width:calc(50% - 4px);text-align:center;padding:11px;border:1px solid var(--line);border-radius:12px;font-weight:600;font-size:12.5px;cursor:pointer;background:var(--white)}
.seg .opt.on{background:var(--kale);color:#fff;border-color:var(--kale)}
#createMap{height:150px;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
.toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%);background:var(--kale);color:#fff;padding:12px 18px;border-radius:14px;font-weight:600;font-size:14px;z-index:2000;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;max-width:88%;text-align:center}
.toast.on{opacity:1}
.auth-wrap{padding:0 22px 24px;overflow-y:auto}
.auth-wrap h2{font-size:26px;color:var(--kale);margin-bottom:6px}
.auth-wrap p{color:var(--muted);font-size:14px;margin:0 0 20px}
.oauth{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:13px;border:1px solid var(--line);background:var(--white);font-family:'Bricolage Grotesque';font-weight:700;font-size:14.5px;cursor:pointer;margin-bottom:10px;color:var(--ink)}
.oauth.apple{background:#000;color:#fff;border-color:#000}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:16px 0}
.divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--line)}
.arow{display:flex;align-items:center;gap:12px;padding:15px 16px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;cursor:pointer;background:var(--white)}
.arow svg{stroke:var(--kale);flex:0 0 auto}
.arow .at{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px}
.arow .as{font-size:12px;color:var(--muted)}
.arow .chev{margin-left:auto;color:var(--muted);font-size:20px}
.pill{display:inline-block;font-size:11px;font-weight:700;color:#2A6B3E;background:#EAF3EC;border:1px solid #BFD8C4;padding:3px 9px;border-radius:99px}
.pill.prem{color:#8A6A12;background:#FBF3DA;border-color:#E7D59A}
.billtoggle{display:flex;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;margin-bottom:12px}
.billtoggle button{flex:1;border:none;background:transparent;font-family:'Bricolage Grotesque';font-weight:700;font-size:13px;color:var(--muted);padding:9px;border-radius:9px;cursor:pointer}
.billtoggle button.on{background:var(--kale);color:#fff}
.billtoggle .save{font-size:10px;background:var(--yolk);color:#4a3708;border-radius:99px;padding:1px 6px;margin-left:5px;font-weight:800}
.tier{border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;position:relative}
.tier.pop{border:2px solid var(--tomato)}
.tier .badge{position:absolute;top:-10px;right:14px;background:var(--tomato);color:#fff;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:99px;font-family:'Bricolage Grotesque'}
.tier .tn{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:var(--kale)}
.tier .tp{font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;margin:2px 0 8px}
.tier .tp small{font-size:12px;color:var(--muted);font-weight:600}
.tier ul{margin:0 0 12px;padding-left:0;list-style:none}
.tier li{font-size:13px;color:var(--ink);padding:4px 0 4px 22px;position:relative}
.tier li:before{content:"";position:absolute;left:0;top:9px;width:12px;height:7px;border-left:2px solid var(--leaf);border-bottom:2px solid var(--leaf);transform:rotate(-45deg)}
.sf-cover{height:118px;position:relative;overflow:hidden;background:linear-gradient(120deg,#26452F,#3F7D53);flex:0 0 auto}
.sf-cover .motif{position:absolute;inset:0;display:flex;gap:20px;align-items:center;justify-content:center;opacity:.16}
.sf-cover .motif svg{width:54px;height:54px}
.sf-body{padding:0 18px 6px}
.sf-av{width:74px;height:74px;border-radius:22px;background:#fff;border:4px solid #fff;margin-top:-40px;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;color:var(--kale);font-size:30px;box-shadow:0 8px 18px rgba(0,0,0,.14)}
.sf-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:21px;color:var(--kale);margin:10px 0 2px}
.sf-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:12.5px;background:var(--leaf-soft);color:var(--kale);padding:6px 11px;border-radius:99px;font-weight:600}
.season{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.season::-webkit-scrollbar{display:none}
.smonth{flex:0 0 auto;width:74px;text-align:center;border:1px solid var(--line);border-radius:14px;padding:9px 6px;background:var(--white)}
.smonth.on{border-color:var(--leaf);background:var(--leaf-soft)}
.smonth .m{font-family:'Bricolage Grotesque';font-weight:800;font-size:12px;color:var(--kale)}
.smonth svg{width:28px;height:28px;margin:3px 0}
.smonth .w{font-size:10px;color:var(--muted);line-height:1.25}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini{border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer}
.mini .mt{height:74px;display:grid;place-items:center}
.mini .mt svg{width:44px;height:44px}
.mini .mb{padding:8px 10px}
.mini .mn{font-family:'Bricolage Grotesque';font-weight:700;font-size:13px}
.mini .mp{color:var(--tomato);font-weight:800;font-size:13px;font-family:'Bricolage Grotesque'}
.chatwrap{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.bub{max-width:78%;padding:10px 13px;border-radius:16px;font-size:13.5px;line-height:1.45}
.bub.them{background:var(--paper-2);align-self:flex-start;border-bottom-left-radius:5px}
.bub.me{background:var(--kale);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.chat-in{display:flex;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--line)}
.chat-in input{flex:1;border:1px solid var(--line);border-radius:99px;padding:11px 14px;font-size:14px;font-family:inherit}
.send{width:42px;height:42px;border-radius:99px;background:var(--tomato);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;border:none}
.status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
.status-pill.acc{background:#EAF3EC;color:#2A6B3E}.status-pill.wait{background:#FBF3DA;color:#8A6A12}
</style>
</head>
<body>
<div id="app">
  <div class="banner" id="demoBanner">Demoläge — data sparas i din webbläsare. Koppla Supabase för skarp drift.</div>

  <div class="view on" id="view-map">
    <div class="top"><div><div class="ttl">Utforska</div><div class="sub" id="mapSub">Söker nära dig</div></div>
      <div class="toggle"><button class="on" onclick="setView('map')">Karta</button><button onclick="setView('list')">Lista</button></div></div>
    <div class="filterbar">
      <div class="distrow"><span class="lbl">Maxavstånd</span><input type="range" min="1" max="20" value="5" id="dist" oninput="onDist(this.value)"><span class="val" id="distVal">5 km</span></div>
      <div class="hchip" id="chips"></div>
    </div>
    <div id="map"></div>
  </div>

  <div class="view" id="view-list">
    <div class="top"><div><div class="ttl">Nära dig</div><div class="sub" id="listSub"></div></div>
      <div class="toggle"><button onclick="setView('map')">Karta</button><button class="on" onclick="setView('list')">Lista</button></div></div>
    <div class="filterbar">
      <div class="distrow"><span class="lbl">Maxavstånd</span><input type="range" min="1" max="20" value="5" id="dist2" oninput="onDist(this.value)"><span class="val" id="distVal2">5 km</span></div>
      <div class="hchip" id="chips2"></div>
    </div>
    <div class="sortrow"><span class="sortlbl">Sortera</span>
      <button class="sortbtn on" data-sort="dist" onclick="setSort('dist')">Avstånd</button>
      <button class="sortbtn" data-sort="rating" onclick="setSort('rating')">Betyg</button>
      <button class="sortbtn" data-sort="new" onclick="setSort('new')">Senaste</button></div>
    <div class="scroll"><div class="list" id="list"></div></div>
  </div>

  <div class="view" id="view-watch">
    <div class="top"><div><div class="ttl">Bevakningar</div><div class="sub">Få en pling när något är klart nära dig</div></div></div>
    <div class="scroll" style="padding:0 16px 24px"><div id="watchBody"></div></div>
  </div>

  <div class="view" id="view-account">
    <div class="top"><div><div class="ttl">Konto</div><div class="sub" id="accSub"></div></div></div>
    <div class="scroll" style="padding:0 16px 24px"><div id="accBody"></div></div>
  </div>

  <div class="overlay" id="detail"></div>
  <div class="overlay" id="sheet"></div>
  <div class="overlay" id="chat"></div>
  <div class="toast" id="toast"></div>

  <nav class="nav" id="nav">
    <a class="on" data-nav="map" onclick="setView('map')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6E7469" stroke-width="2"><path d="M9 20l-6 2V6l6-2 6 2 6-2v16l-6 2-6-2z"/><path d="M9 4v16M15 6v16"/></svg>Utforska</a>
    <a data-nav="list" onclick="setView('list')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6E7469" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>Bläddra</a>
    <a data-nav="create" onclick="openCreate()"><span class="plus"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg></span></a>
    <a data-nav="watch" onclick="setView('watch')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6E7469" stroke-width="2"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/></svg>Bevaka</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const APP_VERSION='0.2.1';
const CONFIG={SUPABASE_URL:'',SUPABASE_ANON_KEY:'',DEFAULT:{lat:59.8586,lng:17.6389,label:'Uppsala'}};
const USE_SUPABASE=!!(CONFIG.SUPABASE_URL&&CONFIG.SUPABASE_ANON_KEY);
let sb=null;
if(USE_SUPABASE&&window.supabase){ sb=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
  const b=document.getElementById('demoBanner'); if(b)b.style.display='none'; }

const MEM={};
const LS={
  get(k,d){ try{const v=localStorage.getItem('skorda_'+k); return v?JSON.parse(v):d;}catch(e){ return (k in MEM)?MEM[k]:d; } },
  set(k,v){ try{localStorage.setItem('skorda_'+k,JSON.stringify(v));}catch(e){ MEM[k]=v; } }
};
const Store={
  session:LS.get('session',null),
  premium:LS.get('premium',{active:false,plan:null}),
  userListings:LS.get('userListings',[]),
  watches:LS.get('watches',[]),
  orders:LS.get('orders',[]),
  messages:LS.get('messages',{}),
  save(){ LS.set('session',this.session); LS.set('premium',this.premium); LS.set('userListings',this.userListings);
    LS.set('watches',this.watches); LS.set('orders',this.orders); LS.set('messages',this.messages); }
};

function svg(id,size){ const el=document.getElementById(id); return el?'<svg width="'+size+'" height="'+size+'" viewBox="'+el.getAttribute('viewBox')+'">'+el.innerHTML+'</svg>':''; }
const ICON={vegetables:'i-greens',fruit_berries:'i-apple',eggs:'i-egg',honey:'i-honey',herbs:'i-greens',plants:'i-greens'};
function iconFor(it){ return (it.icon&&document.getElementById(it.icon))?it.icon:(ICON[it.category]||'i-greens'); }
const STATUS={ready:{label:'Klar nu',cls:'now'},ripening:{label:'Mognar snart',cls:'soon'},on_order:{label:'På beställning',cls:'order'},self_pick:{label:'Självplock',cls:'order'}};
const UNIT={piece:'st',kg:'kg',bunch:'knippe',sixpack:'6-pack',liter:'liter'};
const BG={'i-apple':'#EFE3C7','i-egg':'#F0E7D0','i-honey':'#F2E4C0','i-greens':'#DDE7CE','i-berry':'#E7D6DE','i-squash':'#F0DEBE','i-potato':'#E9DFC8','i-tomato':'#F1D9C9'};
function badgeFor(it){ if(it.kind==='spot')return{label:'Allmän yta',cls:'public'}; if(it.deal==='giveaway')return{label:'Skänkes',cls:'gift'}; return STATUS[it.status]||STATUS.ready; }
function priceShort(it){ if(it.kind==='spot')return'Fritt'; if(it.deal==='giveaway')return'Skänkes'; if(it.status==='ripening')return'Mognar'; return it.price+' kr'+(it.unit?'/'+(UNIT[it.unit]||''):''); }
function pinCls(it){ if(it.kind==='spot')return'public'; if(it.deal==='giveaway')return'gift'; const c=badgeFor(it).cls; return c==='now'?'':c; }
function fmtRating(r){ return r.toFixed(1).replace('.',','); }

const DEMO=[
  {id:'1',title:'Soltomater, blandade sorter',category:'vegetables',kind:'listing',deal:'sale',status:'ready',price:18,unit:'piece',area_label:'Sunnersta, Uppsala',seller:'Karins gårdsstånd',sellerId:'karin',premiumSeller:true,rating:4.9,lat:59.836,lng:17.646,desc:'San Marzano, Sungold och bifftomat. Solmogna i växthus.'},
  {id:'2',title:'Ägg från frigående höns',category:'eggs',kind:'listing',deal:'sale',status:'ready',price:45,unit:'sixpack',area_label:'Gården vid ån',seller:'Gården vid ån',sellerId:'garden',rating:5.0,lat:59.870,lng:17.610,desc:'Färska ägg, 6-pack.'},
  {id:'3',title:'Äpplen — Aroma & Ingrid Marie',category:'fruit_berries',kind:'listing',deal:'sale',status:'ripening',price:25,unit:'kg',area_label:'Norrby',seller:'Trädgården Norrby',sellerId:'norrby',rating:4.7,lat:59.845,lng:17.680,desc:'Mognar v.38. Förbeställ gärna.'},
  {id:'4',title:'Rabarber — plocka själv',category:'vegetables',kind:'listing',deal:'giveaway',status:'self_pick',price:null,unit:null,area_label:'Sunnersta',seller:'Bertil',sellerId:'bertil',rating:4.8,lat:59.862,lng:17.630,desc:'Mer än vi hinner. Kom och plocka. Lådan står vid grinden.'},
  {id:'5',title:'Sommarhonung 500 g',category:'honey',kind:'listing',deal:'sale',status:'on_order',price:70,unit:'piece',area_label:'Sunnersta',seller:'Bertils bigård',sellerId:'bertil',rating:4.8,lat:59.855,lng:17.650,desc:'Slungas på beställning.'},
  {id:'6',title:'Färskpotatis',category:'vegetables',kind:'listing',deal:'sale',status:'ready',price:30,unit:'kg',area_label:'Norrby',seller:'Trädgården Norrby',sellerId:'norrby',rating:4.6,lat:59.840,lng:17.665,icon:'i-potato',desc:'Nyskördad.'},
  {id:'7',title:'Grönkål, knippe',category:'vegetables',kind:'listing',deal:'sale',status:'ready',price:15,unit:'bunch',area_label:'Sunnersta',seller:'Åsas köksträdgård',sellerId:'asa',premiumSeller:true,rating:4.9,lat:59.837,lng:17.648,desc:'Plockad idag.'},
  {id:'8',title:'Krusbärsbuske vid ån — fritt att plocka',category:'fruit_berries',kind:'spot',deal:null,status:'ready',price:null,unit:null,area_label:'Allmänning',seller:'Tipsad av Eva',sellerId:null,rating:null,lat:59.859,lng:17.635,icon:'i-berry',desc:'Växer på allmän mark. Fritt att plocka.'}
];
function allItems(){ return DEMO.concat(Store.userListings); }

const CATS=[{f:'allt',label:'Allt'},{f:'fruit_berries',label:'Frukt & bär'},{f:'vegetables',label:'Grönt'},{f:'eggs',label:'Ägg'},{f:'honey',label:'Honung'},{f:'giveaway',label:'Skänkes'},{f:'allman',label:'Allmän yta'}];
let STATE={center:{lat:CONFIG.DEFAULT.lat,lng:CONFIG.DEFAULT.lng,label:CONFIG.DEFAULT.label},radiusKm:5,cat:'allt',sort:'dist',view:'map'};
let map,markerLayer,radiusCircle,meMarker,createMap,createMarker;

function matchesCat(it){ const f=STATE.cat; if(f==='allt')return true; if(f==='giveaway')return it.deal==='giveaway'; if(f==='allman')return it.kind==='spot'; return it.category===f; }
function withDist(list){ const c=L.latLng(STATE.center.lat,STATE.center.lng); return list.map(it=>({...it,dist:c.distanceTo(L.latLng(it.lat,it.lng))})); }
function visibleItems(){ return withDist(allItems()).filter(it=>matchesCat(it)&&it.dist<=STATE.radiusKm*1000); }

function renderChips(){ ['chips','chips2'].forEach(id=>{ const box=document.getElementById(id); if(!box)return;
  box.innerHTML=CATS.map(c=>'<span class="chip'+(c.f===STATE.cat?' on':'')+'" onclick="setCat(\''+c.f+'\')">'+c.label+'</span>').join(''); }); }
function setCat(f){ STATE.cat=f; renderChips(); refresh(); }

function initMap(){
  map=L.map('map',{zoomControl:false}).setView([STATE.center.lat,STATE.center.lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
  radiusCircle=L.circle([STATE.center.lat,STATE.center.lng],{radius:STATE.radiusKm*1000,color:'#3F7D53',weight:2,dashArray:'6 6',fillColor:'#3F7D53',fillOpacity:.08}).addTo(map);
  meMarker=L.marker([STATE.center.lat,STATE.center.lng],{icon:L.divIcon({className:'',html:'<div class="mepin"></div>',iconSize:[18,18]})}).addTo(map);
}
function renderMap(){
  if(!map)return;
  markerLayer.clearLayers();
  radiusCircle.setLatLng([STATE.center.lat,STATE.center.lng]).setRadius(STATE.radiusKm*1000);
  meMarker.setLatLng([STATE.center.lat,STATE.center.lng]);
  visibleItems().forEach(it=>{
    const rate=(it.rating!=null)?'<div class="prate">'+svg('i-star',9)+' '+fmtRating(it.rating)+'</div>':'';
    const html='<div class="pin '+pinCls(it)+'"><div class="price">'+priceShort(it)+'</div>'+rate+'</div>';
    const m=L.marker([it.lat,it.lng],{icon:L.divIcon({className:'',html,iconSize:[1,1]})});
    m.on('click',()=>openDetail(it.id)); m.addTo(markerLayer);
  });
}

function renderList(){
  const box=document.getElementById('list'); if(!box)return;
  let items=visibleItems();
  if(STATE.sort==='rating')items.sort((a,b)=>(b.rating||0)-(a.rating||0));
  else if(STATE.sort==='new')items.sort((a,b)=>(a.id<b.id?1:-1));
  else items.sort((a,b)=>a.dist-b.dist);
  const sub=document.getElementById('listSub'); if(sub)sub.textContent=items.length+(items.length===1?' annons':' annonser')+' inom '+STATE.radiusKm+' km';
  if(!items.length){ box.innerHTML='<div class="empty"><b>Inget här ännu</b>Prova ett större avstånd eller ett annat filter.</div>'; return; }
  box.innerHTML=items.map(it=>{
    const b=badgeFor(it), ic=iconFor(it);
    let tag; if(it.kind==='spot')tag='<div class="tag publict">Fritt</div>'; else if(it.deal==='giveaway')tag='<div class="tag free">Gratis</div>'; else tag='<div class="tag">'+it.price+' <small>/'+(UNIT[it.unit]||'')+'</small></div>';
    const rate=(it.rating!=null)?'<span class="rate">'+svg('i-star',13)+' '+fmtRating(it.rating)+'</span>':'<span class="rate">'+it.seller+'</span>';
    const km=(it.dist/1000).toFixed(1).replace('.',',');
    return '<div class="card" onclick="openDetail(\''+it.id+'\')"><div class="thumb" style="background:'+(BG[ic]||'#DDE7CE')+'"><div class="stwrap"><span class="st '+b.cls+'">'+b.label+'</span></div>'+svg(ic,76)+tag+'</div><div class="cbody"><div class="name">'+it.title+'</div><div class="meta"><span>'+svg('i-pin',13)+' '+km+' km · '+it.seller+'</span>'+rate+'</div></div></div>';
  }).join('');
}

function directions(lat,lng){
  const ll=lat+','+lng, ua=navigator.userAgent||'';
  const url=/iPhone|iPad|iPod|Macintosh/.test(ua)?('https://maps.apple.com/?daddr='+ll):('https://www.google.com/maps/dir/?api=1&destination='+ll);
  window.open(url,'_blank');
}

function orderFor(itemId){ return Store.orders.find(o=>o.itemId===itemId); }
function openDetail(id){
  const it=allItems().find(x=>x.id===id); if(!it)return;
  const c=L.latLng(STATE.center.lat,STATE.center.lng);
  const km=(c.distanceTo(L.latLng(it.lat,it.lng))/1000).toFixed(1).replace('.',',');
  const ic=iconFor(it), b=badgeFor(it);
  const ord=orderFor(it.id);
  const unlocked=it.kind==='spot'||it.deal==='giveaway'||(ord&&['accepted','picked_up'].includes(ord.status));
  let priceBlock,pickup,action;
  if(it.kind==='spot'){
    priceBlock='<div class="price-lg public">Fritt att plocka</div>';
    pickup='<div class="privacy">'+svg('i-pin',18)+'<div>Allmän mark — exakt plats visas direkt. Respektera allemansrätten och plocka lagom.</div></div>';
    action='<button class="btn" onclick="directions('+it.lat+','+it.lng+')">Vägbeskrivning</button>';
  } else if(it.deal==='giveaway'){
    priceBlock='<div class="price-lg free">Skänkes</div>';
    pickup='<div class="privacy">'+svg('i-pin',18)+'<div>Hämtas hos '+it.seller+' i '+it.area_label+'. Säljaren har satt en exakt hämtningsplats.</div></div>';
    action='<button class="btn" onclick="directions('+it.lat+','+it.lng+')">Vägbeskrivning</button><button class="btn ghost sm" style="margin-top:10px" onclick="contactSeller(\''+it.id+'\')">Skriv till '+it.seller+'</button>';
  } else {
    priceBlock='<div class="price-lg">'+it.price+' kr <small>/ '+(UNIT[it.unit]||'')+'</small></div>';
    if(unlocked){
      pickup='<div class="privacy">'+svg('i-pin',18)+'<div>Accepterad! Hämtas hos '+it.seller+'. Exakt plats upplåst.</div></div>';
      action='<button class="btn" onclick="directions('+it.lat+','+it.lng+')">Vägbeskrivning</button><button class="btn ghost sm" style="margin-top:10px" onclick="contactSeller(\''+it.id+'\')">Meddela '+it.seller+'</button>';
    } else {
      pickup='<div class="privacy">'+svg('i-pin',18)+'<div>Ungefärligt område: <b>'+it.area_label+'</b>. Exakt adress + vägbeskrivning låses upp när '+it.seller+' accepterat din beställning.</div></div>';
      action='<button class="btn" onclick="placeOrder(\''+it.id+'\')">Beställ · hämtas</button><div class="note">Betalning sker på plats (Swish). Ingen avgift i appen.</div>';
    }
  }
  const sellerLine=(it.sellerId)?'<div style="margin-top:10px"><span onclick="openStorefront(\''+it.sellerId+'\')" style="color:var(--leaf);font-weight:700;cursor:pointer">'+it.seller+' →</span></div>':'<div style="margin-top:10px;color:var(--muted)">'+it.seller+'</div>';
  document.getElementById('detail').innerHTML=
    '<div class="scroll">'+
    '<div class="hero" style="background:'+(BG[ic]||'#DDE7CE')+'"><div class="back" onclick="closeOverlay(\'detail\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F3A29" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div>'+svg(ic,120)+'<span class="st '+b.cls+'" style="position:absolute;bottom:14px;left:14px">'+b.label+'</span></div>'+
    '<div class="sec"><p class="k">'+it.area_label+' · '+km+' km</p><h2 style="font-size:22px;color:var(--ink);margin-bottom:8px">'+it.title+'</h2>'+priceBlock+
      (it.rating!=null?'<div style="margin-top:10px;color:#8A6A12;font-weight:600">'+svg('i-star',14)+' '+fmtRating(it.rating)+'</div>':'')+sellerLine+'</div>'+
    (it.desc?'<div class="sec"><p class="k">Om varan</p><p style="font-size:13.5px;line-height:1.6;margin:0">'+it.desc+'</p></div>':'')+
    '<div class="sec"><p class="k">Upphämtning</p>'+pickup+'</div>'+
    '<div class="sec">'+action+'</div>'+
    '</div>';
  showOverlay('detail');
}

function placeOrder(itemId){
  if(!requireLogin())return;
  const it=allItems().find(x=>x.id===itemId); if(!it)return;
  if(orderFor(itemId)){ toast('Du har redan en beställning på denna.'); return; }
  Store.orders.push({id:'o'+Date.now(),itemId,title:it.title,seller:it.seller,lat:it.lat,lng:it.lng,price:it.price,status:'requested',created:Date.now()});
  Store.save(); toast('Beställning skickad till '+it.seller);
  closeOverlay('detail'); setView('account');
}
function acceptOrderDemo(orderId){ const o=Store.orders.find(x=>x.id===orderId); if(o){o.status='accepted'; Store.save(); toast('Säljaren accepterade (demo)'); renderAccount();} }
function markPicked(orderId){ const o=Store.orders.find(x=>x.id===orderId); if(o){o.status='picked_up'; Store.save(); toast('Markerad som hämtad'); renderAccount();} }

function contactSeller(itemId){
  if(!requireLogin())return;
  let o=orderFor(itemId);
  if(!o){ const it=allItems().find(x=>x.id===itemId);
    o={id:'o'+Date.now(),itemId,title:it.title,seller:it.seller,lat:it.lat,lng:it.lng,price:it.price,status:'requested',created:Date.now()};
    Store.orders.push(o); Store.save(); }
  openChat(o.id);
}
function openChat(orderId){
  const o=Store.orders.find(x=>x.id===orderId); if(!o)return;
  const msgs=Store.messages[orderId]||[];
  document.getElementById('chat').innerHTML=
    '<div class="top"><div class="back" style="position:static" onclick="closeOverlay(\'chat\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F3A29" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><div><div class="ttl" style="font-size:18px">'+o.seller+'</div><div class="sub">'+o.title+'</div></div><div style="width:40px"></div></div>'+
    '<div class="chatwrap" id="chatWrap">'+(msgs.length?msgs.map(m=>'<div class="bub '+(m.me?'me':'them')+'">'+m.text+'</div>').join(''):'<div class="empty">Skriv första meddelandet till '+o.seller+'.</div>')+'</div>'+
    '<div class="chat-in"><input id="chatInput" placeholder="Skriv ett meddelande…" onkeydown="if(event.key===\'Enter\')sendMsg(\''+orderId+'\')"><button class="send" onclick="sendMsg(\''+orderId+'\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button></div>';
  showOverlay('chat');
  const w=document.getElementById('chatWrap'); if(w)w.scrollTop=w.scrollHeight;
}
function sendMsg(orderId){
  const inp=document.getElementById('chatInput'); if(!inp||!inp.value.trim())return;
  if(!Store.messages[orderId])Store.messages[orderId]=[];
  Store.messages[orderId].push({me:true,text:inp.value.trim(),t:Date.now()});
  Store.save(); openChat(orderId);
}

function openStorefront(sellerId){
  const items=allItems().filter(x=>x.sellerId===sellerId);
  if(!items.length){ toast('Inga annonser på detta stånd än'); return; }
  const s=items[0], prem=!!s.premiumSeller;
  const avatar=(s.seller||'S').trim().charAt(0).toUpperCase();
  const grid=items.map(it=>{ const ic=iconFor(it);
    const price=it.kind==='spot'?'Fritt':(it.deal==='giveaway'?'Skänkes':it.price+' kr');
    return '<div class="mini" onclick="closeOverlay(\'sheet\');openDetail(\''+it.id+'\')"><div class="mt" style="background:'+(BG[ic]||'#DDE7CE')+'">'+svg(ic,44)+'</div><div class="mb"><div class="mn">'+it.title.split(',')[0].split(' — ')[0]+'</div><div class="mp">'+price+'</div></div></div>'; }).join('');
  const head=prem
    ? '<div class="sf-cover"><div class="motif">'+svg('i-apple',54)+svg('i-greens',54)+svg('i-honey',54)+svg('i-berry',54)+'</div><div class="back" onclick="closeOverlay(\'sheet\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F3A29" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div></div>'
    : '<div class="top"><div class="back" style="position:static" onclick="closeOverlay(\'sheet\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F3A29" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><div class="ttl" style="font-size:18px">'+s.seller+'</div><div style="width:40px"></div></div>';
  const premBlocks=prem
    ? '<div class="sec"><p class="k">Om trädgården</p><p style="font-size:13.5px;line-height:1.6;margin:0">Liten köksträdgård i '+(s.area_label||'trakten')+'. Odlar utan bekämpningsmedel och säljer överskottet. Kom gärna och plocka.</p></div>'+
      '<div class="sec"><p class="k">På gång i år</p><div class="season"><div class="smonth on"><div class="m">JUL</div>'+svg('i-honey',28)+'<div class="w">Honung, örter</div></div><div class="smonth"><div class="m">AUG</div>'+svg('i-berry',28)+'<div class="w">Tomater, bär</div></div><div class="smonth"><div class="m">SEP</div>'+svg('i-apple',28)+'<div class="w">Äpplen</div></div><div class="smonth"><div class="m">OKT</div>'+svg('i-squash',28)+'<div class="w">Pumpa, potatis</div></div></div></div>'
    : '';
  document.getElementById('sheet').innerHTML=
    '<div class="scroll">'+head+
    '<div class="sf-body"><div class="sf-av">'+avatar+'</div><div class="sf-name">'+s.seller+(prem?' <span class="pill">Verifierad</span>':'')+'</div>'+
      '<div style="font-size:13px;color:var(--muted)">'+(s.area_label||'')+'</div>'+(prem?'<div class="sf-link">'+svg('i-pin',13)+' skorda.se/'+sellerId+'</div>':'')+'</div>'+
    premBlocks+
    '<div class="sec"><p class="k">Till salu</p><div class="grid2">'+grid+'</div></div>'+
    (!prem?'<div class="sec"><div class="privacy">'+svg('i-pin',18)+'<div>Enkel profil. Med Premium får säljaren omslag, historia, säsongskalender och delbar länk.</div></div></div>':'')+
    '</div>';
  showOverlay('sheet');
}

let createDeal='sale', createStatus='ready';
function openCreate(){
  if(!requireLogin())return;
  document.getElementById('sheet').innerHTML=
    '<div class="top"><div class="back" style="position:static" onclick="closeOverlay(\'sheet\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F3A29" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><div class="ttl">Ny annons</div><div style="width:40px"></div></div>'+
    '<div class="scroll" style="padding:0 18px 24px">'+
      '<div class="field"><label>Rubrik</label><input id="f_title" placeholder="T.ex. Soltomater"></div>'+
      '<div class="field"><label>Kategori</label><select id="f_cat"><option value="vegetables">Grönsaker</option><option value="fruit_berries">Frukt & bär</option><option value="eggs">Ägg</option><option value="honey">Honung</option><option value="herbs">Örter</option><option value="plants">Plantor</option></select></div>'+
      '<div class="field"><label>Status</label><div class="seg" id="f_status"><div class="opt on" onclick="pickStatus(this,\'ready\')">Klar nu</div><div class="opt" onclick="pickStatus(this,\'ripening\')">Mognar snart</div><div class="opt" onclick="pickStatus(this,\'on_order\')">På beställning</div><div class="opt" onclick="pickStatus(this,\'self_pick\')">Självplock</div></div></div>'+
      '<div class="field"><label>Typ av affär</label><div class="seg" id="f_deal"><div class="opt on" onclick="pickDeal(this,\'sale\')">Säljs</div><div class="opt" onclick="pickDeal(this,\'giveaway\')">Skänkes</div></div></div>'+
      '<div class="field" id="f_pricewrap" style="display:flex;gap:12px"><div style="flex:1"><label>Pris (kr)</label><input id="f_price" type="number" inputmode="numeric" placeholder="18"></div><div style="flex:1"><label>Enhet</label><select id="f_unit"><option value="piece">per st</option><option value="kg">per kg</option><option value="bunch">per knippe</option><option value="sixpack">per 6-pack</option><option value="liter">per liter</option></select></div></div>'+
      '<div class="field"><label>Område (visas publikt)</label><input id="f_area" placeholder="T.ex. Sunnersta, Uppsala"></div>'+
      '<div class="field"><label>Beskrivning</label><textarea id="f_desc" placeholder="Kort om varan…"></textarea></div>'+
      '<div class="field"><label>Hämtningsplats — dra nålen dit varan hämtas</label><div id="createMap"></div><div class="note" id="f_pinnote" style="text-align:left;margin-top:6px">Säljs: exakt läge döljs publikt tills du accepterat. Skänkes: nålen visas exakt.</div></div>'+
      '<button class="btn" onclick="saveListing()">Publicera annons</button>'+
    '</div>';
  showOverlay('sheet');
  createDeal='sale'; createStatus='ready';
  setTimeout(function(){ createMap=L.map('createMap',{zoomControl:false}).setView([STATE.center.lat,STATE.center.lng],14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(createMap);
    createMarker=L.marker([STATE.center.lat,STATE.center.lng],{draggable:true}).addTo(createMap);
    createMap.invalidateSize(); },120);
}
function pickStatus(el,v){ el.parentNode.querySelectorAll('.opt').forEach(o=>o.classList.toggle('on',o===el)); createStatus=v; }
function pickDeal(el,v){ el.parentNode.querySelectorAll('.opt').forEach(o=>o.classList.toggle('on',o===el)); createDeal=v;
  document.getElementById('f_pricewrap').style.display=v==='giveaway'?'none':'flex'; }
function saveListing(){
  const title=(document.getElementById('f_title').value||'').trim();
  if(!title){ toast('Fyll i en rubrik'); return; }
  const cat=document.getElementById('f_cat').value;
  const price=createDeal==='giveaway'?null:(+document.getElementById('f_price').value||0);
  const unit=createDeal==='giveaway'?null:document.getElementById('f_unit').value;
  const area=(document.getElementById('f_area').value||'Uppsala').trim();
  const desc=(document.getElementById('f_desc').value||'').trim();
  const ll=createMarker?createMarker.getLatLng():{lat:STATE.center.lat,lng:STATE.center.lng};
  let lat=ll.lat,lng=ll.lng;
  if(createDeal==='sale'){ const d=(150+Math.random()*250)/111000, a=Math.random()*2*Math.PI; lat+=d*Math.cos(a); lng+=d*Math.sin(a)/Math.cos(ll.lat*Math.PI/180); }
  Store.userListings.push({id:'u'+Date.now(),title,category:cat,kind:'listing',deal:createDeal,status:createStatus,price,unit,area_label:area,seller:Store.session.name,sellerId:Store.session.id,premiumSeller:Store.premium.active,rating:null,lat,lng,desc});
  Store.save(); closeOverlay('sheet'); toast('Annons publicerad'); setView('map'); refresh();
  if(map)map.setView([STATE.center.lat,STATE.center.lng],13);
}

function renderWatch(){
  const box=document.getElementById('watchBody'); if(!box)return;
  const cats=[['fruit_berries','Frukt & bär'],['vegetables','Grönt'],['eggs','Ägg'],['honey','Honung']];
  let html='<p class="k" style="margin:14px 0 8px">Bevaka en gröda</p><div class="hchip" style="flex-wrap:wrap">'+
    cats.map(c=>'<span class="chip" onclick="addWatch(\''+c[0]+'\',\''+c[1]+'\')">+ '+c[1]+'</span>').join('')+'</div>';
  html+='<p class="k" style="margin:20px 0 8px">Du bevakar</p>';
  if(!Store.watches.length){ html+='<div class="empty" style="padding:20px"><b>Inga bevakningar än</b>Lägg till en gröda ovan så plingar vi när något dyker upp inom '+STATE.radiusKm+' km.</div>'; }
  else { html+=Store.watches.map(w=>'<div class="arow"><div class="at">'+w.label+'</div><div class="as" style="margin-left:auto;margin-right:10px">inom '+w.radius+' km</div><span onclick="removeWatch(\''+w.id+'\')" style="color:var(--muted);font-size:20px;cursor:pointer">×</span></div>').join(''); }
  html+='<div class="privacy" style="margin-top:14px">'+svg('i-pin',18)+'<div>Riktiga pling-notiser kräver backend (Supabase). Här sparas bevakningarna lokalt så länge.</div></div>';
  box.innerHTML=html;
}
function addWatch(cat,label){ Store.watches.push({id:'w'+Date.now(),cat,label,radius:STATE.radiusKm}); Store.save(); toast('Bevakar '+label); renderWatch(); }
function removeWatch(id){ Store.watches=Store.watches.filter(w=>w.id!==id); Store.save(); renderWatch(); }

function requireLogin(){ if(Store.session)return true; openAuth(); return false; }
function openAuth(){
  document.getElementById('sheet').innerHTML=
    '<div class="top"><div class="back" style="position:static" onclick="closeOverlay(\'sheet\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F3A29" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><div class="ttl">Logga in</div><div style="width:40px"></div></div>'+
    '<div class="auth-wrap"><h2>Välkommen till Skörda</h2><p>Logga in för att sälja, beställa och bevaka. Bläddra är alltid gratis.</p>'+
    '<button class="oauth apple" onclick="demoOAuth(\'Apple\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M16 1c0 1.2-.5 2.4-1.3 3.2-.9.9-2.2 1.6-3.4 1.5-.1-1.2.5-2.4 1.3-3.2C13.4 1.6 14.9.9 16 1zm3.5 16.5c-.6 1.4-1 2-1.8 3.2-1.1 1.7-2.7 3.8-4.6 3.8-1.7 0-2.1-1.1-4.4-1.1s-2.8 1.1-4.4 1.1c-1.9 0-3.4-1.9-4.5-3.6C-1 18-1.5 12.9.8 10c1.1-1.4 2.6-2.3 4.2-2.3 1.9 0 3.1 1.1 4.4 1.1 1.3 0 2.1-1.1 4.4-1.1 1.4 0 2.9.8 4 2.1-3.5 1.9-2.9 6.9 1.7 7.7z"/></svg>Fortsätt med Apple</button>'+
    '<button class="oauth" onclick="demoOAuth(\'Google\')"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M23 12.3c0-.8-.1-1.5-.2-2.3H12v4.5h6.2c-.3 1.4-1.1 2.6-2.3 3.4v2.8h3.7C21.7 18.7 23 15.8 23 12.3z"/><path fill="#34A853" d="M12 24c3.1 0 5.7-1 7.6-2.8l-3.7-2.8c-1 .7-2.3 1.1-3.9 1.1-3 0-5.5-2-6.4-4.7H1.8v2.9C3.7 21.5 7.5 24 12 24z"/><path fill="#FBBC05" d="M5.6 14.8c-.2-.7-.4-1.4-.4-2.8s.1-2.1.4-2.8V6.3H1.8C1 7.9.5 9.9.5 12s.5 4.1 1.3 5.7l3.8-2.9z"/><path fill="#EA4335" d="M12 5.4c1.7 0 3.2.6 4.4 1.7l3.3-3.3C17.7 1.8 15.1.8 12 .8 7.5.8 3.7 3.3 1.8 6.3l3.8 2.9C6.5 6.4 9 5.4 12 5.4z"/></svg>Fortsätt med Google</button>'+
    '<div class="divider">eller med e-post</div>'+
    '<div class="field"><label>Namn (visas på ditt gårdsstånd)</label><input id="au_name" placeholder="T.ex. Karins trädgård"></div>'+
    '<div class="field"><label>E-post</label><input id="au_email" type="email" inputmode="email" placeholder="du@example.se"></div>'+
    '<button class="btn" onclick="demoEmailLogin()">Logga in / skapa konto</button>'+
    '<div class="note">Demo: inget lösenord, ingen e-post skickas. Riktig inloggning kopplas via Supabase Auth (Apple/Google/e-post).</div></div>';
  showOverlay('sheet');
}
function demoOAuth(prov){ Store.session={id:prov.toLowerCase()+'_user',name:prov+'-användare',email:prov.toLowerCase()+'@demo.se'}; Store.save(); afterLogin(); }
function demoEmailLogin(){
  const email=(document.getElementById('au_email').value||'').trim();
  const name=(document.getElementById('au_name').value||'').trim()||(email.split('@')[0]||'Min trädgård');
  if(!email){ toast('Fyll i e-post'); return; }
  Store.session={id:(email.replace(/[^a-z0-9]/gi,'').toLowerCase())||('u'+Date.now()),name,email}; Store.save(); afterLogin();
}
function afterLogin(){ closeOverlay('sheet'); toast('Inloggad som '+Store.session.name); setView('account'); }
function logout(){ Store.session=null; Store.save(); toast('Utloggad'); renderAccount(); }

function goPremium(mode){ Store.premium={active:true,plan:mode}; Store.userListings.forEach(l=>l.premiumSeller=true); Store.save();
  toast('Premium aktiverat (demo)'); closeOverlay('sheet'); renderAccount(); }
let planMode='month';
function openPlan(){
  document.getElementById('sheet').innerHTML=
    '<div class="top"><div class="back" style="position:static" onclick="closeOverlay(\'sheet\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F3A29" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><div class="ttl">Sälj på Skörda</div><div style="width:40px"></div></div>'+
    '<div class="scroll" style="padding:0 18px 24px">'+
    '<div class="billtoggle"><button class="on" id="bm" onclick="setBilling(\'month\')">Månad</button><button id="by" onclick="setBilling(\'year\')">År <span class="save">−50%</span></button></div>'+
    '<div class="tier"><div class="tn">Gratis</div><div class="tp">0 kr <small>/ mån</small></div><ul><li>Upp till 3 aktiva annonser</li><li>Karta, chatt & bevakning</li><li>Enkel säljarprofil</li><li>Verifierad-märke (gratis)</li></ul></div>'+
    '<div class="tier pop"><div class="badge">Populär</div><div class="tn">Premium</div><div class="tp" id="planPrice">79 kr <small>/ mån</small></div><div id="planSub" style="font-size:12px;color:var(--muted);margin:-4px 0 10px">Avsluta när du vill</div><ul><li>Egen sida med delbar länk & omslag</li><li>Obegränsat antal annonser</li><li>Pling till alla som följer ditt stånd</li><li>2 boost/mån ingår (värde 38 kr)</li><li>Statistik & kundlista</li></ul><button class="btn sm" onclick="goPremium(planMode)">Bli Premium</button></div>'+
    '<div class="privacy">'+svg('i-pin',18)+'<div>Betalning sker via App Store/Google Play (RevenueCat). Här är det en demo-knapp som låser upp Premium lokalt.</div></div>'+
    '</div>';
  planMode='month'; showOverlay('sheet');
}
function setBilling(mode){ planMode=mode;
  document.getElementById('bm').classList.toggle('on',mode==='month');
  document.getElementById('by').classList.toggle('on',mode==='year');
  const p=document.getElementById('planPrice'), s=document.getElementById('planSub');
  if(mode==='year'){ p.innerHTML='479 kr <small>/ år</small>'; s.textContent='12 månader för priset av 6 — sälj hela året, betala för halva'; }
  else { p.innerHTML='79 kr <small>/ mån</small>'; s.textContent='Avsluta när du vill'; }
}

function renderAccount(){
  const box=document.getElementById('accBody'), sub=document.getElementById('accSub'); if(!box)return;
  if(!Store.session){
    sub.textContent='Inte inloggad';
    box.innerHTML='<div class="empty" style="padding:30px 20px"><b>Logga in</b>För att sälja, beställa och bevaka.</div><button class="btn" onclick="openAuth()">Logga in / skapa konto</button>';
    return;
  }
  sub.textContent=Store.session.name+(Store.premium.active?' · Premium':'');
  const mine=Store.userListings, orders=Store.orders;
  let html='';
  html+='<div class="arow" onclick="openStorefront(\''+Store.session.id+'\')">'+svg('i-pin',22)+'<div><div class="at">Min egen sida</div><div class="as">'+(Store.premium.active?'Premium — omslag, historia, säsong':'Gratis — enkel profil')+'</div></div><span class="chev">›</span></div>';
  html+='<div class="arow" onclick="openPlan()">'+svg('i-star',22)+'<div><div class="at">Plan '+(Store.premium.active?'<span class="pill prem">Premium</span>':'<span class="pill">Gratis</span>')+'</div><div class="as">'+(Store.premium.active?('Premium ('+(Store.premium.plan==='year'?'år':'månad')+')'):'Uppgradera för egen sida & obegränsat')+'</div></div><span class="chev">›</span></div>';
  html+='<p class="k" style="margin:20px 0 8px">Mina annonser ('+mine.length+')</p>';
  if(!mine.length) html+='<div class="empty" style="padding:18px"><b>Inga annonser än</b>Tryck på + för att lägga upp något.</div>';
  else html+=mine.map(it=>{ const ic=iconFor(it), b=badgeFor(it);
    return '<div class="arow"><div style="width:40px;height:40px;border-radius:10px;display:grid;place-items:center;background:'+(BG[ic]||'#DDE7CE')+'">'+svg(ic,26)+'</div><div><div class="at">'+it.title+'</div><div class="as"><span class="st '+b.cls+'" style="padding:1px 7px">'+b.label+'</span></div></div><span onclick="event.stopPropagation();delListing(\''+it.id+'\')" style="margin-left:auto;color:var(--muted);font-size:20px;cursor:pointer">×</span></div>'; }).join('');
  html+='<p class="k" style="margin:20px 0 8px">Mina beställningar ('+orders.length+')</p>';
  if(!orders.length) html+='<div class="empty" style="padding:18px"><b>Inga beställningar</b>Beställningar du gör hamnar här.</div>';
  else html+=orders.map(o=>{
    const st=o.status==='requested'?'<span class="status-pill wait">Väntar</span>':(o.status==='accepted'?'<span class="status-pill acc">Accepterad</span>':'<span class="status-pill acc">Hämtad</span>');
    let actions='';
    if(o.status==='requested') actions='<button class="btn ghost sm" onclick="acceptOrderDemo(\''+o.id+'\')">Säljaren accepterar (demo)</button>';
    else if(o.status==='accepted') actions='<div style="display:flex;gap:8px"><button class="btn sm" style="flex:1" onclick="directions('+o.lat+','+o.lng+')">Vägbeskrivning</button><button class="btn ghost sm" style="flex:1" onclick="markPicked(\''+o.id+'\')">Hämtad</button></div>';
    return '<div style="border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:10px"><div style="font-family:\'Bricolage Grotesque\';font-weight:700">'+o.title+'</div><div style="margin-left:auto">'+st+'</div></div><div style="color:var(--muted);font-size:12px;margin:4px 0 10px">'+o.seller+(o.price?(' · '+o.price+' kr'):'')+'</div>'+actions+'<button class="btn ghost sm" style="margin-top:8px" onclick="openChat(\''+o.id+'\')">Meddela</button></div>'; }).join('');
  html+='<button class="btn ghost sm" style="margin-top:18px" onclick="logout()">Logga ut</button>';
  box.innerHTML=html;
}
function delListing(id){ Store.userListings=Store.userListings.filter(l=>l.id!==id); Store.save(); refresh(); renderAccount(); toast('Annons borttagen'); }

function showOverlay(id){ document.getElementById(id).classList.add('on'); }
function closeOverlay(id){ document.getElementById(id).classList.remove('on'); }
function setView(v){
  STATE.view=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('on',el.id==='view-'+v));
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('on',a.dataset.nav===v));
  if(v==='map'&&map)setTimeout(()=>map.invalidateSize(),60);
  if(v==='watch')renderWatch();
  if(v==='account')renderAccount();
}
function onDist(v){ v=+v; STATE.radiusKm=v;
  ['distVal','distVal2'].forEach(id=>{const e=document.getElementById(id); if(e)e.textContent=v+' km';});
  ['dist','dist2'].forEach(id=>{const e=document.getElementById(id); if(e){e.value=v; const pct=((v-1)/19)*100; e.style.background='linear-gradient(90deg,var(--leaf) '+pct+'%,var(--line) '+pct+'%)';}});
  refresh();
}
function setSort(s){ STATE.sort=s; document.querySelectorAll('.sortbtn').forEach(b=>b.classList.toggle('on',b.dataset.sort===s)); renderList(); }
function refresh(){ renderMap(); renderList(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('on'),2200); }

function boot(){
  renderChips();
  try{ initMap(); }catch(e){ console.warn('Kartan kunde inte starta:',e); }
  onDist(5); refresh(); renderAccount();
  setTimeout(()=>{ if(map)map.invalidateSize(); },250);
  setTimeout(()=>{ if(map)map.invalidateSize(); },900);
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      STATE.center={lat:pos.coords.latitude,lng:pos.coords.longitude,label:'din plats'};
      if(map)map.setView([STATE.center.lat,STATE.center.lng],13); refresh();
    },()=>{ const s=document.getElementById('mapSub'); if(s)s.textContent='Söker i '+CONFIG.DEFAULT.label; },{enableHighAccuracy:true,timeout:6000});
  } else { const s=document.getElementById('mapSub'); if(s)s.textContent='Söker i '+CONFIG.DEFAULT.label; }
}
window.addEventListener('load',boot);
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{})); }
</script>
</body>
</html>
